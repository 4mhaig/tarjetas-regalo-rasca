<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#1A1A1A"/>
  <!-- Card body -->
  <rect x="4" y="7" width="24" height="18" rx="3" fill="#252525"/>
  <!-- Gold scratch strip (top portion of card) -->
  <rect x="4" y="7" width="24" height="8" rx="3" fill="#C0B283"/>
  <rect x="4" y="11" width="24" height="4" fill="#C0B283"/>
  <!-- Scratch mark lines -->
  <line x1="8"  y1="7.5" x2="10" y2="14" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="13" y1="7.5" x2="15" y2="14" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="18" y1="7.5" x2="20" y2="14" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Revealed star -->
  <polygon
    points="16,15.5 17.2,18.4 20.3,18.6 17.9,20.6 18.7,23.6 16,22 13.3,23.6 14.1,20.6 11.7,18.6 14.8,18.4"
    fill="#C0B283"
  />
</svg>
